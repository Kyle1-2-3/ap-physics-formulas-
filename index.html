<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<title>AP Physics 1 Formula Cards</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
:root {
  --bg: #0f0f1a;
  --bg-card: #1a1a2e;
  --bg-hover: #222240;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --accent: #6c63ff;
  --accent-glow: rgba(108,99,255,0.3);
  --green: #4caf84;
  --red: #e05555;
  --border: rgba(255,255,255,0.08);
  --radius: 12px;
  --font: Arial, Helvetica, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  margin: 0; background: var(--bg); color: var(--text); font-family: var(--font);
  line-height: 1.5; -webkit-font-smoothing: antialiased;
  min-height: 100vh; padding-bottom: env(safe-area-inset-bottom);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

.katex { color: var(--text); font-size: 1.15em; }
.katex-display { margin: 0 !important; overflow-x: auto; overflow-y: hidden; }

.app { max-width: 800px; margin: 0 auto; padding: 24px 16px 80px; }
@media(min-width:640px) { .app { padding: 40px 24px 100px; } }

/* Header */
.header { text-align: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
.header h1 { font-size: 28px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.02em; }
.header h1 span { color: var(--accent); }
.header .sub { font-size: 14px; color: var(--text-dim); }

/* Unit grid */
.grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media(min-width:480px) { .grid { grid-template-columns: 1fr 1fr; } }
@media(min-width:720px) { .grid { grid-template-columns: repeat(3, 1fr); } }

.unit-btn {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 16px; text-align: left; width: 100%; display: flex; flex-direction: column; gap: 8px;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.unit-btn:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 4px 20px var(--accent-glow); }
.unit-btn .unit-num { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }
.unit-btn h3 { font-size: 17px; font-weight: 700; margin: 0; line-height: 1.25; }
.unit-btn .count { font-size: 12px; color: var(--text-dim); }
.unit-btn.all-btn { border-color: var(--accent); background: linear-gradient(135deg, var(--bg-card), rgba(108,99,255,0.1)); }
.unit-btn.all-btn .unit-num { color: var(--green); }

/* Back button */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 700; color: var(--text-dim); margin-bottom: 16px;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.back-btn:hover { color: var(--accent); }

/* Unit header */
.unit-title { font-size: 24px; font-weight: 700; margin: 0 0 20px; }
.unit-title span { color: var(--accent); }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab {
  font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-dim); padding: 14px 20px; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: color 0.2s, border-color 0.2s;
}
.tab.active { color: var(--text); border-color: var(--accent); }
.tab:hover { color: var(--text); }

/* Review list */
.review-list { display: flex; flex-direction: column; gap: 0; }
.review-row {
  padding: 16px 4px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px;
}
.review-row .formula-name { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em; }
.review-row .formula-eq { padding: 4px 0; overflow-x: auto; }

/* Flash card */
.quiz-area { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.progress-bar { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; color: var(--text-dim); }
.progress-bar .bar { flex: 1; height: 4px; background: var(--bg-card); border-radius: 99px; overflow: hidden; }
.progress-bar .bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; border-radius: 99px; }

.card {
  width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 36px 24px; height: 420px; display: flex; flex-direction: column;
  position: relative; transition: box-shadow 0.2s;
}
@media(min-width:640px) { .card { padding: 44px 32px; height: 460px; } }
.card .card-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 20px; }
.card .card-content { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0; }
.card .card-prompt { font-size: 26px; font-weight: 700; line-height: 1.3; margin: 0; }
@media(min-width:640px) { .card .card-prompt { font-size: 32px; } }
.card .card-eq { text-align: center; padding: 24px 0; margin: 12px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); overflow-x: auto; }
.card .card-eq .katex { font-size: 1.8em; }
@media(min-width:640px) { .card .card-eq .katex { font-size: 2.2em; } }
.card .card-desc { font-size: 13px; color: var(--text-dim); margin-top: 8px; }

.flip-hint { font-size: 13px; color: var(--text-dim); text-align: center; letter-spacing: 0.08em; margin: 8px 0; }

.controls { display: flex; gap: 12px; margin-top: auto; padding-top: 24px; flex-wrap: wrap; }
.btn {
  font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 18px 24px; border-radius: 10px; flex: 1; min-width: 120px; min-height: 56px; text-align: center;
  transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: 0.85; }
.btn-wrong { background: transparent; border: 1.5px solid var(--red); color: var(--red); }
.btn-wrong:hover { background: var(--red); color: #fff; }
.btn-right { background: var(--green); color: #fff; }
.btn-right:hover { opacity: 0.85; }
.btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--text-dim); }
.btn-ghost:hover { border-color: var(--text); color: var(--text); }

/* Complete screen */
.complete { text-align: center; padding: 40px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
.complete .score { font-size: 64px; font-weight: 700; color: var(--accent); }
.complete .score-label { font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin: 4px 0 20px; }
.complete h3 { font-size: 20px; margin: 0 0 8px; }
.complete p { color: var(--text-dim); font-size: 14px; margin: 0 0 24px; }

/* Wrong-only filter */
.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-chip {
  font-size: 13px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.06em;
  padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px; transition: all 0.15s;
}
.filter-chip:hover, .filter-chip.active { color: var(--text); border-color: var(--accent); }
.filter-chip.active { background: rgba(108,99,255,0.15); }

.empty { padding: 40px; text-align: center; color: var(--text-dim); font-size: 14px; }

/* Nuke button */
.nuke-btn {
  display: block; margin: 0 auto 32px; padding: 18px 36px;
  font-size: 18px; font-weight: 900; letter-spacing: 0.08em;
  background: linear-gradient(135deg, #e05555, #ff6b35); color: #fff;
  border-radius: 14px; border: 2px solid #ff4444;
  box-shadow: 0 0 20px rgba(255,60,60,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer; position: relative; overflow: hidden;
}
.nuke-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(255,60,60,0.5); }
.nuke-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%); animation: nukeShine 2s infinite;
}
@keyframes nukeShine { to { transform: translateX(100%); } }

/* Explosion */
.shake { animation: shake 0.5s ease-out; }
@keyframes shake {
  0%,100% { transform: translate(0); }
  10% { transform: translate(-20px, 14px) rotate(-1deg); }
  20% { transform: translate(18px, -10px) rotate(1.5deg); }
  30% { transform: translate(-14px, 20px) rotate(-2deg); }
  40% { transform: translate(22px, -8px) rotate(1deg); }
  50% { transform: translate(-10px, -16px) rotate(-1.5deg); }
  60% { transform: translate(16px, 12px) rotate(2deg); }
  70% { transform: translate(-22px, -14px) rotate(-1deg); }
  80% { transform: translate(18px, 16px) rotate(1.5deg); }
  90% { transform: translate(-8px, -20px) rotate(-2deg); }
}
.fly-away {
  transition: all 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
  opacity: 0 !important;
}
.flash-overlay {
  position: fixed; inset: 0; background: #fff; z-index: 9999;
  animation: flashBang 0.8s ease-out forwards;
  pointer-events: none;
}
@keyframes flashBang { 0% { opacity: 1; } 100% { opacity: 0; } }

/* Explosion canvas */
.boom-canvas {
  position: fixed; inset: 0; z-index: 9998; pointer-events: none;
}

/* Celebration */
.celebrate-overlay {
  position: fixed; inset: 0; z-index: 10000;
  background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: celebFadeIn 1s ease-out;
  overflow: hidden;
}
@keyframes celebFadeIn { from { opacity: 0; } to { opacity: 1; } }
.celebrate-overlay .celeb-emoji { font-size: 80px; margin-bottom: 16px; animation: celebBounce 0.6s ease-out; }
@keyframes celebBounce { 0% { transform: scale(0) rotate(-20deg); } 60% { transform: scale(1.3) rotate(5deg); } 100% { transform: scale(1) rotate(0); } }
.celebrate-overlay h1 {
  font-size: 42px; font-weight: 900; margin: 0 0 12px; text-align: center; padding: 0 20px;
  background: linear-gradient(135deg, #ff6b9d, #c084fc, #60a5fa, #34d399);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; animation: celebTitle 0.8s ease-out 0.2s both;
}
@keyframes celebTitle { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.celebrate-overlay .celeb-sub {
  font-size: 18px; color: #b8b8d0; margin: 0 0 8px; text-align: center; padding: 0 20px;
  animation: celebTitle 0.8s ease-out 0.5s both;
}
.celebrate-overlay .celeb-msg {
  font-size: 15px; color: #8888a0; margin: 0 0 36px; text-align: center; padding: 0 20px;
  animation: celebTitle 0.8s ease-out 0.7s both;
}
.celebrate-overlay .celeb-close {
  font-size: 14px; font-weight: 700; color: #8888a0; letter-spacing: 0.1em;
  padding: 12px 28px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
  cursor: pointer; background: none; font-family: inherit;
  animation: celebTitle 0.8s ease-out 1s both; transition: all 0.2s;
}
.celebrate-overlay .celeb-close:hover { color: #e8e8f0; border-color: rgba(255,255,255,0.4); }

/* Confetti */
.confetti {
  position: fixed; top: -10px; width: 10px; height: 10px; z-index: 10001;
  border-radius: 2px; animation: confettiFall linear forwards; pointer-events: none;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* Graph unit */
.unit-btn.graph-btn { border-color: #ff9800; background: linear-gradient(135deg, var(--bg-card), rgba(255,152,0,0.1)); }
.unit-btn.graph-btn .unit-num { color: #ff9800; }
.graph-canvas { display: block; margin: 0 auto; border-radius: 8px; }
.graph-answer { display: flex; flex-direction: column; gap: 10px; padding: 12px 0; }
.graph-answer .ga-row { display: flex; gap: 8px; align-items: baseline; }
.graph-answer .ga-label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; min-width: 55px; }
.graph-answer .ga-val { font-family: Arial, Helvetica, sans-serif; font-size: 15px; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const UNITS = [
  { num: 1, name: 'Kinematics' },
  { num: 2, name: 'Force' },
  { num: 3, name: 'Work & Energy' },
  { num: 4, name: 'Gravitation' },
  { num: 5, name: 'Momentum' },
  { num: 6, name: 'Rotational Motion' },
  { num: 7, name: 'Oscillation' },
  { num: 8, name: 'Fluids' },
];

/*
  Each formula:
  - front: what shows on the flash card front (the "question")
  - back: the answer(s) shown when flipped
  - latex: full equation for review mode
  - desc: short description
*/
const FORMULAS = [
  // Unit 1: Kinematics
  { id:'k1', unit:1, front:'x =', back:'v_0 t + \\tfrac{1}{2}at^2', latex:'x = v_0 t + \\tfrac{1}{2}at^2', desc:'Position (constant acceleration)' },
  { id:'k2', unit:1, front:'2a\\Delta x =', back:'v_f^2 - v_i^2', latex:'2a\\Delta x = v_f^2 - v_i^2', desc:'Time-free kinematic equation' },
  { id:'k3', unit:1, front:'v_f =', back:'v_0 + at', latex:'v_f = v_0 + at', desc:'Velocity (constant acceleration)' },

  // Unit 2: Force
  { id:'f1', unit:2, front:'F =', back:'ma', latex:'F = ma', desc:"Newton's 2nd Law" },
  { id:'f2', unit:2, front:'F_f =', back:'F_N \\cdot \\mu', latex:'F_f = F_N \\cdot \\mu', desc:'Friction Force' },
  { id:'f3', unit:2, front:'F_s =', back:'-kx', latex:'F_s = -kx', desc:"Spring Force / Hooke's Law" },
  { id:'f4', unit:2, front:'F_c =', back:'\\dfrac{v^2}{r} \\cdot m', latex:'F_c = \\dfrac{v^2}{r} \\cdot m', desc:'Centripetal Force' },
  { id:'f5', unit:2, front:'a_c =', back:'\\dfrac{v^2}{r}', latex:'a_c = \\dfrac{v^2}{r}', desc:'Centripetal Acceleration' },

  // Unit 3: Work & Energy
  { id:'e1', unit:3, front:'W =', back:'Fd\\cos\\theta = \\Delta KE', latex:'W = Fd\\cos\\theta = \\Delta KE', desc:'Work-Energy Theorem' },
  { id:'e2', unit:3, front:'P =', back:'\\dfrac{W}{t} = Fv', latex:'P = \\dfrac{W}{t} = Fv', desc:'Power' },
  { id:'e3', unit:3, front:'\\text{Energy Conservation (non-conservative)}', back:'KE_i + PE_i + W_{nc} = KE_f + PE_f', latex:'KE_i + PE_i + W_{nc} = KE_f + PE_f', desc:'Conservation of Energy (with non-conservative work)' },
  { id:'e4', unit:3, front:'U_s =', back:'\\tfrac{1}{2}kx^2', latex:'U_s = \\tfrac{1}{2}kx^2', desc:'Elastic Potential Energy' },

  // Unit 4: Gravitation
  { id:'g1', unit:4, front:'F_g =', back:'\\dfrac{G \\cdot m_1 \\cdot m_2}{r^2}', latex:'F_g = \\dfrac{G \\cdot m_1 \\cdot m_2}{r^2}', desc:"Newton's Law of Universal Gravitation" },
  { id:'g2', unit:4, front:'PE =', back:'-\\dfrac{G \\cdot m_1 \\cdot m_2}{r}', latex:'PE = -\\dfrac{G \\cdot m_1 \\cdot m_2}{r}', desc:'Gravitational Potential Energy' },

  // Unit 5: Momentum
  { id:'m1', unit:5, front:'p =', back:'mv', latex:'p = mv', desc:'Momentum' },
  { id:'m2', unit:5, front:'J = \\Delta p =', back:'F \\cdot t', latex:'J = \\Delta p = F \\cdot t', desc:'Impulse' },
  { id:'m3', unit:5, front:'\\text{Elastic Collision?}', back:'\\text{Momentum AND energy conserved}', latex:'\\text{Elastic: momentum and energy conserved}', desc:'Elastic Collision' },
  { id:'m4', unit:5, front:'\\text{Inelastic Collision?}', back:'\\text{Only momentum conserved}', latex:'\\text{Inelastic: only momentum conserved}', desc:'Inelastic Collision' },

  // Unit 6: Rotational Motion
  { id:'r1', unit:6, front:'a =', back:'\\alpha r', latex:'a = \\alpha r', desc:'Linear–Angular acceleration' },
  { id:'r2', unit:6, front:'v =', back:'\\omega r', latex:'v = \\omega r', desc:'Linear–Angular velocity' },
  { id:'r3', unit:6, front:'x =', back:'\\theta r', latex:'x = \\theta r', desc:'Arc length' },
  { id:'r4', unit:6, front:'KE_{rot} =', back:'\\tfrac{1}{2} I \\omega^2', latex:'KE_{rot} = \\tfrac{1}{2} I \\omega^2', desc:'Rotational Kinetic Energy' },
  { id:'r5', unit:6, front:'I =', back:'mr^2', latex:'I = mr^2', desc:'Moment of Inertia (point mass)' },
  { id:'r6', unit:6, front:'\\tau =', back:'Fr = I\\alpha', latex:'\\tau = Fr = I\\alpha', desc:'Torque' },
  { id:'r7', unit:6, front:'L =', back:'pr', latex:'L = pr', desc:'Angular Momentum' },
  { id:'r8', unit:6, front:'\\Delta L =', back:'\\tau \\cdot t', latex:'\\Delta L = \\tau \\cdot t', desc:'Change in Angular Momentum' },
  { id:'r9', unit:6, front:'W_{rot} =', back:'\\tau \\cdot \\theta', latex:'W_{rot} = \\tau \\cdot \\theta', desc:'Rotational Work' },

  // Unit 7: Oscillation
  { id:'o1', unit:7, front:'T =', back:'\\dfrac{1}{f}', latex:'T = \\dfrac{1}{f}', desc:'Period' },
  { id:'o2', unit:7, front:'f =', back:'\\dfrac{1}{T}', latex:'f = \\dfrac{1}{T}', desc:'Frequency' },
  { id:'o3', unit:7, front:'\\omega =', back:'2\\pi f', latex:'\\omega = 2\\pi f', desc:'Angular Frequency' },
  { id:'o4', unit:7, front:'T_{spring} =', back:'2\\pi\\sqrt{\\dfrac{m}{k}}', latex:'T_{spring} = 2\\pi\\sqrt{\\dfrac{m}{k}}', desc:'Period of a Spring' },
  { id:'o5', unit:7, front:'T_{pendulum} =', back:'2\\pi\\sqrt{\\dfrac{L}{g}}', latex:'T_{pendulum} = 2\\pi\\sqrt{\\dfrac{L}{g}}', desc:'Period of a Pendulum' },

  // Unit 8: Fluids
  { id:'fl1', unit:8, front:'P =', back:'\\dfrac{F}{A} = \\rho g h', latex:'P = \\dfrac{F}{A} = \\rho g h', desc:'Pressure' },
  { id:'fl2', unit:8, front:'\\rho =', back:'\\dfrac{m}{V}', latex:'\\rho = \\dfrac{m}{V}', desc:'Density' },
  { id:'fl3', unit:8, front:"\\text{Equation of Continuity?}", back:'A_1 v_1 = A_2 v_2', latex:'A_1 v_1 = A_2 v_2', desc:'Equation of Continuity' },
  { id:'fl4', unit:8, front:"\\text{Bernoulli's Equation?}", back:'P_1 + \\rho g h_1 + \\tfrac{1}{2}\\rho v_1^2 = P_2 + \\rho g h_2 + \\tfrac{1}{2}\\rho v_2^2', latex:'P_1 + \\rho g h_1 + \\tfrac{1}{2}\\rho v_1^2 = P_2 + \\rho g h_2 + \\tfrac{1}{2}\\rho v_2^2', desc:"Bernoulli's Equation" },
];

const GRAPHS = [
  // Kinematics
  { id:'gr1', title:'x vs t', xAxis:'t', yAxis:'x', draw:'linear', slope:'Velocity (v)', area:'Nothing', desc:'Position vs Time' },
  { id:'gr3', title:'v vs t', xAxis:'t', yAxis:'v', draw:'linear', slope:'Acceleration (a)', area:'Displacement (\u0394x)', desc:'Velocity vs Time' },
  { id:'gr4', title:'a vs t', xAxis:'t', yAxis:'a', draw:'horizontal', slope:'Nothing', area:'Change in velocity (\u0394v)', desc:'Acceleration vs Time' },
  // Force & Momentum
  { id:'gr5', title:'F vs t', xAxis:'t', yAxis:'F', draw:'bump', slope:'Nothing', area:'Impulse (J = \u0394p)', desc:'Force vs Time (impulse)' },
  { id:'gr15', title:'F vs x', xAxis:'x', yAxis:'F', draw:'linear', slope:'Nothing', area:'Work (W)', desc:'Force vs Displacement' },
  { id:'gr7', title:'p vs t', xAxis:'t', yAxis:'p', draw:'linear', slope:'Net force (F\u2099\u2091\u209C)', area:'Nothing', desc:'Momentum vs Time' },
  { id:'gr16', title:'m vs v', xAxis:'v', yAxis:'m', draw:'linear', slope:'Nothing', area:'Momentum (p)', desc:'Mass vs Velocity' },
  // Energy
  { id:'gr8', title:'PE vs x', xAxis:'x', yAxis:'U', draw:'parabola-center', slope:'Negative of force (\u2212F)', area:'Nothing', desc:'Potential Energy vs Position' },
  { id:'gr17', title:'P vs t', xAxis:'t', yAxis:'P', draw:'linear', slope:'Nothing', area:'Work (W)', desc:'Power vs Time' },
  { id:'gr18', title:'W vs t', xAxis:'t', yAxis:'W', draw:'linear', slope:'Power (P)', area:'Nothing', desc:'Work vs Time' },
  // Rotation
  { id:'gr9', title:'\u03B8 vs t', xAxis:'t', yAxis:'\u03B8', draw:'linear', slope:'Angular velocity (\u03C9)', area:'Nothing', desc:'Angular Position vs Time' },
  { id:'gr10', title:'\u03C9 vs t', xAxis:'t', yAxis:'\u03C9', draw:'linear', slope:'Angular acceleration (\u03B1)', area:'Angular displacement (\u0394\u03B8)', desc:'Angular Velocity vs Time' },
  { id:'gr11', title:'\u03B1 vs t', xAxis:'t', yAxis:'\u03B1', draw:'horizontal', slope:'Nothing', area:'Change in angular velocity (\u0394\u03C9)', desc:'Angular Acceleration vs Time' },
  { id:'gr12', title:'\u03C4 vs t', xAxis:'t', yAxis:'\u03C4', draw:'bump', slope:'Nothing', area:'Angular impulse (\u0394L)', desc:'Torque vs Time' },
  { id:'gr13', title:'L vs t', xAxis:'t', yAxis:'L', draw:'linear', slope:'Net torque (\u03C4\u2099\u2091\u209C)', area:'Nothing', desc:'Angular Momentum vs Time' },
];

/* Storage */
const mem = {};
const Store = {
  get(k) { try { const v = localStorage.getItem(k); return v === null ? null : v; } catch(e) { return mem[k] ?? null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch(e) { mem[k] = v; } },
  getJSON(k, fb) { const v = this.get(k); if (v === null) return fb; try { return JSON.parse(v); } catch(e) { return fb; } },
  setJSON(k, o) { this.set(k, JSON.stringify(o)); },
};

/* State */
const S = {
  view: 'home',    // 'home' | 'unit'
  unit: null,      // unit number or 'all'
  mode: 'review',  // 'review' | 'flash'
  filter: 'all',   // 'all' | 'wrong'
  q: null,         // quiz state
  wrong: Store.getJSON('ap.wrong', {}),  // { formulaId: true }
};
function saveWrong() { Store.setJSON('ap.wrong', S.wrong); }

/* Helpers */
const $ = (s, r = document) => r.querySelector(s);
function el(tag, attrs = {}, ...kids) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v != null && v !== false) e.setAttribute(k, String(v));
  }
  for (const c of kids) {
    if (c == null || c === false) continue;
    if (Array.isArray(c)) c.forEach(x => e.append(x?.nodeType ? x : document.createTextNode(String(x))));
    else e.append(c.nodeType ? c : document.createTextNode(String(c)));
  }
  return e;
}
function shuffle(a) { const b = a.slice(); for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b; }

function tex(latex, display = true) {
  const span = document.createElement('span');
  if (window.katex) {
    try { window.katex.render(latex, span, { displayMode: display, throwOnError: false, output: 'html' }); return span; } catch(e) {}
  }
  span.textContent = latex;
  span.style.fontFamily = 'monospace';
  return span;
}

function getFormulas(unit) {
  if (unit === 'all') return FORMULAS;
  if (unit === 'graphs') return GRAPHS;
  return FORMULAS.filter(f => f.unit === unit);
}

function drawGraph(canvas, g, w) {
  const dpr = window.devicePixelRatio || 1;
  const h = Math.round(w * 0.65);
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const pad = { t: 32, r: 16, b: 32, l: 40 };
  const gw = w - pad.l - pad.r, gh = h - pad.t - pad.b;

  ctx.fillStyle = '#12122a'; ctx.fillRect(0, 0, w, h);

  // axes
  ctx.strokeStyle = '#8888a0'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, pad.t + gh); ctx.lineTo(pad.l + gw, pad.t + gh); ctx.stroke();

  // labels
  ctx.fillStyle = '#e8e8f0'; ctx.font = '14px Arial, Helvetica, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(g.xAxis, pad.l + gw / 2, h - 6);
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText(g.yAxis, pad.l + 4, pad.t - 6);

  // curve
  const fns = {
    'linear': t => t,
    'horizontal': t => 0.5,
    'parabola': t => t * t,
    'parabola-center': t => 4 * (t - 0.5) * (t - 0.5),
    'bump': t => Math.sin(Math.PI * t),
    'sine': t => 0.5 + 0.45 * Math.sin(2 * Math.PI * t),
  };
  const fn = fns[g.draw] || fns['linear'];
  ctx.strokeStyle = '#6c63ff'; ctx.lineWidth = 2.5; ctx.beginPath();
  for (let i = 0; i <= 80; i++) {
    const t = i / 80, x = pad.l + t * gw, y = pad.t + gh - fn(t) * gh * 0.85;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

/* Render */
function render() {
  const app = $('#app');
  app.innerHTML = '';
  if (S.view === 'home') app.append(renderHome());
  else app.append(renderUnit());
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function renderHome() {
  const root = el('div');
  root.append(
    el('header', { class: 'header' },
      el('h1', {}, 'AP Physics 1 ', el('span', {}, 'Formulas')),
      el('div', { class: 'sub' }, FORMULAS.length + ' formulas across ' + UNITS.length + ' units')
    )
  );
  const grid = el('div', { class: 'grid' });
  UNITS.forEach(u => {
    const count = getFormulas(u.num).length;
    const wrongCount = getFormulas(u.num).filter(f => S.wrong[f.id]).length;
    grid.append(
      el('button', { class: 'unit-btn', onclick: () => openUnit(u.num) },
        el('div', { class: 'unit-num' }, 'Unit ' + u.num),
        el('h3', {}, u.name),
        el('div', { class: 'count' }, count + ' formulas' + (wrongCount ? ' · ' + wrongCount + ' marked wrong' : ''))
      )
    );
  });
  const allWrong = FORMULAS.filter(f => S.wrong[f.id]).length;
  grid.append(
    el('button', { class: 'unit-btn all-btn', onclick: () => openUnit('all') },
      el('div', { class: 'unit-num' }, 'All Units'),
      el('h3', {}, 'All Formulas'),
      el('div', { class: 'count' }, FORMULAS.length + ' formulas' + (allWrong ? ' · ' + allWrong + ' marked wrong' : ''))
    )
  );
  const graphWrong = GRAPHS.filter(g => S.wrong[g.id]).length;
  grid.append(
    el('button', { class: 'unit-btn graph-btn', onclick: () => openUnit('graphs') },
      el('div', { class: 'unit-num' }, 'Special'),
      el('h3', {}, 'Graph Analysis'),
      el('div', { class: 'count' }, GRAPHS.length + ' graphs' + (graphWrong ? ' · ' + graphWrong + ' marked wrong' : ''))
    )
  );
  root.append(grid);

  if (Object.keys(S.wrong).length > 0) {
    root.append(
      el('div', { style: 'text-align:center;margin-top:24px' },
        el('button', { class: 'btn btn-ghost', style: 'display:inline-block;flex:none;padding:10px 20px', onclick: () => { if(confirm('Clear all wrong marks?')) { S.wrong = {}; saveWrong(); render(); } } }, 'Reset All Marks')
      )
    );
  }

  // Nuke button
  const nukeSection = el('div', { style: 'margin-top:48px;padding-top:32px;border-top:1px solid var(--border);text-align:center' });
  nukeSection.append(
    el('div', { style: 'font-size:13px;color:var(--text-dim);margin-bottom:12px;letter-spacing:0.05em' }, 'AP Physics 1 Exam is OVER.'),
    el('button', { class: 'nuke-btn', onclick: nukeTheSite }, 'Do u want to explode this site?')
  );
  root.append(nukeSection);

  return root;
}

function openUnit(num) { S.view = 'unit'; S.unit = num; S.mode = 'review'; S.filter = 'all'; S.q = null; render(); }
function goHome() { S.view = 'home'; S.q = null; render(); }

function renderUnit() {
  const root = el('div');
  const unitName = S.unit === 'all' ? 'All Formulas' : S.unit === 'graphs' ? 'Graph Analysis' : 'Unit ' + S.unit + ': ' + UNITS.find(u => u.num === S.unit).name;
  root.append(
    el('button', { class: 'back-btn', onclick: goHome }, '\u2190 Back'),
    el('h2', { class: 'unit-title' }, unitName)
  );
  const tabs = el('div', { class: 'tabs' });
  [{ id: 'review', label: 'Review' }, { id: 'flash', label: 'Flash Cards' }].forEach(t => {
    tabs.append(el('button', { class: 'tab' + (S.mode === t.id ? ' active' : ''), onclick: () => { S.mode = t.id; if (t.id === 'flash') startQuiz(); render(); } }, t.label));
  });
  root.append(tabs);
  if (S.mode === 'review') root.append(renderReview());
  else root.append(renderQuiz());
  return root;
}

function renderReview() {
  const root = el('div');
  const items = getFormulas(S.unit);
  const wrongItems = items.filter(f => S.wrong[f.id]);

  const filters = el('div', { class: 'filter-bar' });
  filters.append(
    el('button', { class: 'filter-chip' + (S.filter === 'all' ? ' active' : ''), onclick: () => { S.filter = 'all'; render(); } }, 'All (' + items.length + ')'),
    el('button', { class: 'filter-chip' + (S.filter === 'wrong' ? ' active' : ''), onclick: () => { S.filter = 'wrong'; render(); } }, 'Wrong (' + wrongItems.length + ')')
  );
  root.append(filters);

  const filtered = S.filter === 'wrong' ? wrongItems : items;
  if (filtered.length === 0) {
    root.append(el('div', { class: 'empty' }, S.filter === 'wrong' ? 'No formulas marked wrong. Nice!' : 'No formulas.'));
    return root;
  }

  const list = el('div', { class: 'review-list' });
  filtered.forEach(f => {
    const row = el('div', { class: 'review-row' });
    const nameRow = el('div', { style: 'display:flex;justify-content:space-between;align-items:center' });
    nameRow.append(el('div', { class: 'formula-name' }, f.desc || f.title));
    const wrongBtn = el('button', {
      style: 'font-size:12px;font-weight:700;padding:4px 10px;border-radius:4px;border:1px solid' + (S.wrong[f.id] ? 'var(--red)' : 'var(--border)') + ';color:' + (S.wrong[f.id] ? 'var(--red)' : 'var(--text-dim)'),
      onclick: () => { if (S.wrong[f.id]) delete S.wrong[f.id]; else S.wrong[f.id] = true; saveWrong(); render(); }
    }, S.wrong[f.id] ? 'WRONG \u2716' : 'Mark Wrong');
    nameRow.append(wrongBtn);
    row.append(nameRow);
    if (f.draw) {
      const c = el('canvas', { class: 'graph-canvas' });
      row.append(c);
      requestAnimationFrame(() => drawGraph(c, f, Math.min(280, row.clientWidth - 8)));
      const info = el('div', { class: 'graph-answer' });
      info.append(
        el('div', { class: 'ga-row' }, el('span', { class: 'ga-label' }, 'Slope:'), el('span', { class: 'ga-val' }, f.slope)),
        el('div', { class: 'ga-row' }, el('span', { class: 'ga-label' }, 'Area:'), el('span', { class: 'ga-val' }, f.area))
      );
      row.append(info);
    } else {
      const eqDiv = el('div', { class: 'formula-eq' });
      eqDiv.append(tex(f.latex, true));
      row.append(eqDiv);
    }
    list.append(row);
  });
  root.append(list);
  return root;
}

function startQuiz() {
  let pool = getFormulas(S.unit);
  S.q = { items: shuffle(pool), idx: 0, correct: 0, flipped: false, wrongThisRound: {} };
}

function renderQuiz() {
  const root = el('div', { class: 'quiz-area' });
  if (!S.q) startQuiz();
  const q = S.q;

  if (q.idx >= q.items.length) {
    root.append(renderComplete());
    return root;
  }

  const total = q.items.length;
  const cur = q.items[q.idx];
  const pct = Math.round(q.idx / total * 100);

  root.append(
    el('div', { class: 'progress-bar' },
      el('span', {}, (q.idx + 1) + ' / ' + total),
      el('div', { class: 'bar' }, el('div', { class: 'bar-fill', style: 'width:' + pct + '%' })),
      el('span', {}, 'Correct: ' + q.correct)
    )
  );

  const isGraph = !!cur.draw;
  const card = el('div', { class: 'card' });

  if (!q.flipped) {
    if (isGraph) {
      card.append(el('div', { class: 'card-label' }, 'Graph: ' + cur.desc));
      const content = el('div', { class: 'card-content' });
      const c = el('canvas', { class: 'graph-canvas' });
      content.append(c);
      requestAnimationFrame(() => drawGraph(c, cur, Math.min(340, card.clientWidth - 48)));
      content.append(el('div', { style: 'text-align:center;font-size:14px;color:var(--text-dim);margin-top:12px' }, 'What does the slope and area represent?'));
      card.append(content);
    } else {
      card.append(el('div', { class: 'card-label' }, 'What is the formula?'));
      const content = el('div', { class: 'card-content' });
      content.append(el('div', { class: 'card-desc', style: 'margin-bottom:12px;margin-top:0' }, cur.desc));
      const promptEq = el('div', { class: 'card-eq' });
      promptEq.append(tex(cur.front, true));
      content.append(promptEq);
      content.append(el('div', { class: 'flip-hint' }, 'Tap to reveal answer'));
      card.append(content);
    }
    card.append(
      el('div', { class: 'controls' },
        el('button', { class: 'btn btn-wrong', onclick: () => answer(false) }, "\u2716 Don't Know"),
        el('button', { class: 'btn btn-primary', onclick: () => { q.flipped = true; render(); } }, 'Flip \u2192')
      )
    );
  } else {
    if (isGraph) {
      card.append(el('div', { class: 'card-label' }, 'Answer: ' + cur.desc));
      const content = el('div', { class: 'card-content' });
      const answers = el('div', { class: 'graph-answer' });
      answers.append(
        el('div', { class: 'ga-row' }, el('span', { class: 'ga-label' }, 'Slope:'), el('span', { class: 'ga-val' }, cur.slope)),
        el('div', { class: 'ga-row' }, el('span', { class: 'ga-label' }, 'Area:'), el('span', { class: 'ga-val' }, cur.area))
      );
      content.append(answers);
      card.append(content);
    } else {
      card.append(el('div', { class: 'card-label' }, 'Answer'));
      const content = el('div', { class: 'card-content' });
      const fullEq = el('div', { class: 'card-eq' });
      fullEq.append(tex(cur.latex, true));
      content.append(fullEq);
      content.append(el('div', { class: 'card-desc' }, cur.desc));
      card.append(content);
    }
    card.append(
      el('div', { class: 'controls' },
        el('button', { class: 'btn btn-wrong', onclick: () => answer(false) }, "\u2716 Wrong"),
        el('button', { class: 'btn btn-right', onclick: () => answer(true) }, "\u2714 Got It")
      )
    );
  }

  root.append(card);
  return root;
}

function answer(correct) {
  const q = S.q;
  const cur = q.items[q.idx];
  if (correct) {
    q.correct++;
    // If they get it right, remove from wrong list
    if (S.wrong[cur.id]) { delete S.wrong[cur.id]; saveWrong(); }
  } else {
    S.wrong[cur.id] = true;
    q.wrongThisRound[cur.id] = true;
    saveWrong();
  }
  q.idx++;
  q.flipped = false;
  render();
}

function renderComplete() {
  const q = S.q;
  const pct = Math.round(q.correct / q.items.length * 100);
  const wrongCount = Object.keys(q.wrongThisRound).length;
  let msg = 'Keep going!';
  if (pct === 100) msg = '사랑해 すごい';
  else msg = '마오야...';

  const div = el('div', { class: 'complete' },
    el('div', { class: 'score' }, pct + '%'),
    el('div', { class: 'score-label' }, q.correct + ' / ' + q.items.length + ' correct' + (wrongCount ? ' · ' + wrongCount + ' marked wrong' : '')),
    el('h3', {}, 'Session Complete'),
    el('p', {}, msg),
    el('div', { class: 'controls', style: 'max-width:400px;margin:0 auto' },
      el('button', { class: 'btn btn-ghost', onclick: goHome }, '\u2190 Back'),
      el('button', { class: 'btn btn-primary', onclick: () => { startQuiz(); render(); } }, 'Again \u21bb')
    )
  );

  if (wrongCount > 0) {
    div.append(
      el('button', {
        class: 'btn btn-wrong', style: 'margin-top:12px;max-width:400px;margin-left:auto;margin-right:auto;display:block;width:100%',
        onclick: () => {
          const wrongPool = S.q.items.filter(f => S.q.wrongThisRound[f.id]);
          S.q = { items: shuffle(wrongPool), idx: 0, correct: 0, flipped: false, wrongThisRound: {} };
          render();
        }
      }, 'Retry Wrong Ones (' + wrongCount + ')')
    );
  }
  return div;
}

/* Nuke */
/* Explosion engine - canvas based for real boom effects */
let boomCanvas, boomCtx, boomParticles = [], boomFrame;
function initBoomCanvas() {
  boomCanvas = document.createElement('canvas');
  boomCanvas.className = 'boom-canvas';
  const dpr = window.devicePixelRatio || 1;
  boomCanvas.width = innerWidth * dpr; boomCanvas.height = innerHeight * dpr;
  boomCanvas.style.width = innerWidth + 'px'; boomCanvas.style.height = innerHeight + 'px';
  document.body.append(boomCanvas);
  boomCtx = boomCanvas.getContext('2d');
  boomCtx.scale(dpr, dpr);
  boomParticles = [];
  tickBoom();
}
function tickBoom() {
  boomCtx.clearRect(0, 0, innerWidth, innerHeight);
  for (let i = boomParticles.length - 1; i >= 0; i--) {
    const p = boomParticles[i];
    if (p.type === 'spark') {
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.vx *= 0.98;
      p.life -= p.decay;
      // glow
      boomCtx.globalAlpha = Math.max(0, p.life) * 0.4;
      boomCtx.fillStyle = p.color;
      boomCtx.beginPath(); boomCtx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2); boomCtx.fill();
      // core
      boomCtx.globalAlpha = Math.max(0, p.life);
      boomCtx.fillStyle = '#fff';
      boomCtx.beginPath(); boomCtx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2); boomCtx.fill();
    } else if (p.type === 'ring') {
      p.radius += p.speed;
      p.life -= p.decay;
      boomCtx.globalAlpha = Math.max(0, p.life) * 0.7;
      boomCtx.strokeStyle = p.color;
      boomCtx.lineWidth = Math.max(1, p.width * p.life);
      boomCtx.beginPath(); boomCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); boomCtx.stroke();
    } else if (p.type === 'flash') {
      p.life -= p.decay;
      const grad = boomCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
      grad.addColorStop(0, `rgba(255,255,255,${Math.max(0, p.life)})`);
      grad.addColorStop(0.3, `rgba(255,200,100,${Math.max(0, p.life) * 0.6})`);
      grad.addColorStop(1, 'rgba(255,100,50,0)');
      boomCtx.globalAlpha = 1;
      boomCtx.fillStyle = grad;
      boomCtx.fillRect(p.x - p.radius, p.y - p.radius, p.radius * 2, p.radius * 2);
    } else if (p.type === 'smoke') {
      p.x += p.vx; p.y += p.vy; p.vy -= 0.05; p.size += 0.8;
      p.life -= p.decay;
      boomCtx.globalAlpha = Math.max(0, p.life) * 0.25;
      boomCtx.fillStyle = p.color;
      boomCtx.beginPath(); boomCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); boomCtx.fill();
    }
    if (p.life <= 0) boomParticles.splice(i, 1);
  }
  boomCtx.globalAlpha = 1;
  boomFrame = requestAnimationFrame(tickBoom);
}
function spawnBoom(x, y) {
  const sparkColors = ['#ff4444','#ff6b35','#fbbf24','#ff6b9d','#e879f9','#ff8c00','#ff1744'];
  // Big center flash
  boomParticles.push({ type:'flash', x, y, radius: 180, life: 1, decay: 0.04 });
  // Shockwave rings
  boomParticles.push({ type:'ring', x, y, radius: 0, speed: 12, life: 1, decay: 0.025, color:'rgba(255,150,50,0.8)', width: 6 });
  boomParticles.push({ type:'ring', x, y, radius: 0, speed: 8, life: 1, decay: 0.02, color:'rgba(255,80,80,0.6)', width: 4 });
  // Sparks
  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 10;
    boomParticles.push({
      type:'spark', x, y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
      size: 2 + Math.random() * 5, life: 1, decay: 0.01 + Math.random() * 0.02,
      color: sparkColors[Math.floor(Math.random() * sparkColors.length)]
    });
  }
  // Smoke puffs
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    boomParticles.push({
      type:'smoke', x, y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      size: 8 + Math.random() * 15, life: 1, decay: 0.008 + Math.random() * 0.01,
      color: ['#555','#666','#444','#777'][Math.floor(Math.random()*4)]
    });
  }
}

function nukeTheSite() {
  const app = $('#app');
  initBoomCanvas();

  // Phase 1: Screen shake (longer)
  app.classList.add('shake');

  // Phase 2: Cards explode one by one
  const cards = app.querySelectorAll('.unit-btn, .nuke-btn, .header, .btn');
  cards.forEach((card, i) => {
    const delay = i * 180;
    setTimeout(() => {
      const rect = card.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      spawnBoom(cx, cy);

      // Re-shake each time
      app.classList.remove('shake');
      void app.offsetWidth;
      app.classList.add('shake');

      const angle = Math.random() * 360;
      const dist = 800 + Math.random() * 1200;
      const dx = Math.cos(angle * Math.PI / 180) * dist;
      const dy = Math.sin(angle * Math.PI / 180) * dist;
      const rot = (Math.random() - 0.5) * 720;
      card.style.transition = 'all 1.2s cubic-bezier(0.25, 0.8, 0.25, 1)';
      card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
      card.style.opacity = '0';
    }, delay);
  });

  const totalTime = cards.length * 180;

  // Phase 3: Final big explosion in center
  setTimeout(() => {
    spawnBoom(innerWidth / 2, innerHeight / 2);
    spawnBoom(innerWidth * 0.3, innerHeight * 0.4);
    spawnBoom(innerWidth * 0.7, innerHeight * 0.6);
  }, totalTime + 100);

  // Phase 3.5: Flash bang
  setTimeout(() => {
    const flash = el('div', { class: 'flash-overlay' });
    document.body.append(flash);
    setTimeout(() => flash.remove(), 800);
  }, totalTime + 400);
  setTimeout(() => {
    const flash2 = el('div', { class: 'flash-overlay' });
    flash2.style.background = 'var(--accent)';
    document.body.append(flash2);
    setTimeout(() => flash2.remove(), 600);
  }, totalTime + 800);

  // Phase 4: Celebration
  setTimeout(() => {
    cancelAnimationFrame(boomFrame);
    boomCanvas.remove();
    app.innerHTML = '';
    showCelebration();
  }, totalTime + 1400);
}

function spawnConfetti(count = 100) {
  const colors = ['#ff6b9d','#c084fc','#60a5fa','#34d399','#fbbf24','#f87171','#fb923c','#a78bfa','#e879f9','#22d3ee'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.width = (6 + Math.random() * 10) + 'px';
    c.style.height = (6 + Math.random() * 10) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.animationDuration = (2.5 + Math.random() * 3.5) + 's';
    c.style.animationDelay = (Math.random() * 2.5) + 's';
    document.body.append(c);
    setTimeout(() => c.remove(), 7000);
  }
}

function spawnFireworks() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:10002;pointer-events:none';
  const dpr = window.devicePixelRatio || 1;
  canvas.width = innerWidth * dpr; canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + 'px'; canvas.style.height = innerHeight + 'px';
  document.body.append(canvas);
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const particles = [];
  const colors = ['#ff6b9d','#c084fc','#60a5fa','#34d399','#fbbf24','#f87171','#fb923c','#e879f9','#22d3ee','#fff'];

  function burst(x, y) {
    const count = 60 + Math.random() * 40;
    const color = colors[Math.floor(Math.random() * colors.length)];
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 4;
      particles.push({
        x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        life: 1, decay: 0.008 + Math.random() * 0.012,
        size: 2 + Math.random() * 3, color,
        trail: []
      });
    }
  }

  // Launch sequence
  const launches = [
    { t: 0, x: 0.3, y: 0.3 }, { t: 200, x: 0.7, y: 0.25 }, { t: 400, x: 0.5, y: 0.35 },
    { t: 700, x: 0.2, y: 0.4 }, { t: 900, x: 0.8, y: 0.3 }, { t: 1100, x: 0.5, y: 0.2 },
    { t: 1400, x: 0.35, y: 0.35 }, { t: 1600, x: 0.65, y: 0.28 },
    { t: 2000, x: 0.4, y: 0.3 }, { t: 2100, x: 0.6, y: 0.3 }, { t: 2200, x: 0.5, y: 0.25 },
  ];
  launches.forEach(l => setTimeout(() => burst(innerWidth * l.x, innerHeight * l.y), l.t));

  let frame;
  function tick() {
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.trail.push({ x: p.x, y: p.y, life: p.life });
      if (p.trail.length > 6) p.trail.shift();
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.03;
      p.vx *= 0.99;
      p.life -= p.decay;
      // Draw trail
      for (let j = 0; j < p.trail.length; j++) {
        const t = p.trail[j];
        ctx.globalAlpha = t.life * 0.3 * (j / p.trail.length);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(t.x, t.y, p.size * 0.6, 0, Math.PI * 2); ctx.fill();
      }
      // Draw particle
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      if (p.life <= 0) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1;
    if (particles.length > 0) frame = requestAnimationFrame(tick);
    else { cancelAnimationFrame(frame); canvas.remove(); }
  }
  tick();
}

function showCelebration() {
  spawnConfetti(120);
  setTimeout(() => spawnConfetti(80), 1200);
  setTimeout(() => spawnConfetti(60), 2800);
  spawnFireworks();

  const overlay = el('div', { class: 'celebrate-overlay' },
    el('div', { class: 'celeb-emoji' }, '\uD83C\uDF89'),
    el('h1', {}, 'Congratulations!'),
    el('div', { class: 'celeb-sub' }, 'No more physics'),
    el('div', { class: 'celeb-msg' }, 'No more stress'),
    el('div', { class: 'celeb-msg', style: 'animation-delay:0.9s;margin-top:4px' }, '\u2764\uFE0F')
  );
  document.body.append(overlay);
}

/* Boot */
function boot() { render(); }
if (window.katex) boot();
else window.addEventListener('load', boot);
</script>
